# GitHub Snake 贪吃蛇生成工作流配置
name: GitHub Snake

# 触发条件：每 8 小时自动运行 + 手动触发
on:
  schedule:
    - cron: "0 */8 * * *"  # 每 8 小时整点（UTC 0:00、8:00、16:00，约北京时间 8:00、16:00、0:00）
  workflow_dispatch:       # 手动触发开关，方便测试

# 提前适配 Node 24，消除 "Node.js 20 actions are deprecated" 警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 允许 workflow 把生成的 SVG 提交并推回仓库（解决 403 Permission denied）
permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest  # 使用 GitHub 提供的 Ubuntu 云环境
    steps:
      # 第一步：拉取当前仓库代码
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 第二步：生成贪吃蛇 SVG 文件（核心步骤）
      - name: Generate GitHub snake SVG
        uses: Platane/snk@v3  # 调用开源的贪吃蛇生成工具
        with:
          # 使用仓库所有者的 GitHub 用户名（自动获取，无需手动改）
          github_user_name: ${{ github.repository_owner }}
          # 亮色/暗色双主题：默认绿色贡献 + 白底（github-light）与深色预设（github-dark）
          outputs: |
            github-snake.svg?palette=github-light
            github-snake-dark.svg?palette=github-dark

      # 第三步：将生成的 SVG 文件提交并推回仓库
      - name: Push SVG files to repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update GitHub snake SVG"  # 提交说明
          file_pattern: "*.svg"  # 只提交 SVG 文件