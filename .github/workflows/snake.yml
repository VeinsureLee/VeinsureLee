# GitHub Snake 贪吃蛇生成工作流配置
name: GitHub Snake

# 触发条件：每天 UTC 0 点自动运行 + 手动触发
on:
  schedule:
    - cron: "0 0 * * *"  # 北京时间每天 8 点更新（UTC+8）
  workflow_dispatch:     # 手动触发开关，方便测试

jobs:
  generate-snake:
    runs-on: ubuntu-latest  # 使用 GitHub 提供的 Ubuntu 云环境
    steps:
      # 第一步：拉取当前仓库代码
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 第二步：生成贪吃蛇 SVG 文件（核心步骤）
      - name: Generate GitHub snake SVG
        uses: Platane/snk@v3  # 调用开源的贪吃蛇生成工具
        with:
          # 使用仓库所有者的 GitHub 用户名（自动获取，无需手动改）
          github_user_name: ${{ github.repository_owner }}
          # 生成的 SVG 文件存放位置（直接放仓库根目录，避免路径问题）
          outputs: |
            github-snake.svg
            github-snake-dark.svg
          # 可选：自定义贪吃蛇颜色（可根据喜好修改）
          color_snake: "#6495ED"    # 蛇身颜色（天蓝色）
          color_dots: "#F5F5F5"     # 点的颜色（浅灰色）

      # 第三步：将生成的 SVG 文件提交并推回仓库
      - name: Push SVG files to repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update GitHub snake SVG"  # 提交说明
          file_pattern: "*.svg"  # 只提交 SVG 文件